name: ci

on:
  push:
    paths-ignore:
      - '**.md'
  release:
    types: [published]

jobs:
  shell-check:
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    name: Shell Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check Shell Scripts
        run: shellcheck -s bash .ci/*.sh

  check-license:
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    name: Check License
    runs-on: ubuntu-latest

    steps:
      - name: Setup APT Repositories
        run: |
          sudo rm -f /etc/apt/sources.list.d/dotnetdev.list
          sudo rm -f /etc/apt/sources.list.d/azure*.list

      - name: Install System Dependencies
        run: |
          sudo apt-get update --quiet --yes 1>/dev/null
          sudo apt-get install --no-install-recommends -q -y pcregrep

      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Check License
        run: .ci/check-license.sh

  build:
    if: "!contains(github.event.head_commit.message, '[ci skip]')"

    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 5

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Grant Execute Permission for Gradle
        run: chmod +x gradlew

      - name: Bundle the Project as a Distribution
        run: ./gradlew buildPlugin

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: intellij-zephir-distributions
          path: build/distributions

      - name: Runs the Unit Tests
        run: ./gradlew test

      - name: Validate Plugin
        run: ./gradlew verifyPlugin

      - name: Save Test Results
        if: ${{ always() }}
        run: |
          mkdir -p ./tests-result
          find . -type f -regex ".*/build/test-results/.*xml" -exec cp {} ./tests-result/ \;

      - name: Upload Tests Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: intellij-zephir-tests-result
          path: tests-result

      - name: Upload Tests Report
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: intellij-zephir-tests-reports
          path: build/reports/tests

      - name: Success Reporting
        if: ${{ always() }}
        run: git log --format=fuller -5

  release:
    if: github.event_name == 'release'
    needs: [shell-check, check-license, build]

    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Distribution Artifact
        uses: actions/download-artifact@v4
        with:
          name: intellij-zephir-distributions
          path: build/distributions

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
